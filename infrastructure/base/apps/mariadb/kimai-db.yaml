# db
apiVersion: k8s.mariadb.com/v1alpha1
kind: Database
metadata:
  name: kimai
  namespace: kimai
spec:
  mariaDbRef:
    name: mariadb-galera
  characterSet: utf8
  collate: utf8_general_ci
---
# user
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: kimai
  namespace: kimai
spec:
  mariaDbRef:
    name: mariadb-galera
  passwordSecretKeyRef:
    name: kimai-mariadb
    key: mariadb-password
  maxUserConnections: 20
---
# grant
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: kimai
  namespace: kimai
spec:
  mariaDbRef:
    name: mariadb-galera
    namespace: mariadb
  privileges:
    - "ALL PRIVILEGES"
  database: "kimai"
  table: "*"
  username: kimai
