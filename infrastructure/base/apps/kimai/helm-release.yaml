apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kimai
  namespace: kimai
spec:
  chart:
    spec:
      chart: kimai2
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: kimai
        namespace: flux-system
      version: 4.2.5
  interval: 1m0s
  values:
    kimaiAdminEmail: ${EMAIL}
    existingSecret: kimai-secret
    ingress:
      extraHosts:
        - name: time.${DOMAIN_2}
          path: /
        - name: time.${DOMAIN_3}
          path: /
      extraTls:
        - hosts:
          - time.${DOMAIN_2}
          secretName: kimai-app-tls
        - hosts:
          - time.${DOMAIN_3}
          - secretName: kimai-cloud-tls
      enabled: true
      ingressClassName: "nginx"
      hostname: kimai.${DOMAIN}
      path: /
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls: true
    persistence:
      storageClass: "longhorn"
    podSecurityContext:
      enabled: true
      fsGroup: 1001
      seccompProfile:
        type: "RuntimeDefault"
    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
    mariadb:
      enabled: false
    updateStrategy:
      type: Recreate
    # add custom volume for cache and logs
    extraVolumes:
      - name: cache
        emptyDir: { }
      - name: logs
        emptyDir: { }
    extraVolumeMounts:
      - name: cache
        mountPath: /opt/kimai/var/cache/prod
      - name: logs
        mountPath: /opt/kimai/var/log
