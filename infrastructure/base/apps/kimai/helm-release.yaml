apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kimai
  namespace: kimai
spec:
  chart:
    spec:
      chart: kimai2
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: kimai
        namespace: flux-system
      version: 4.2.5
  interval: 1m0s
  values:
    kimaiAdminEmail: ${EMAIL}
    existingSecret: kimai-secret
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hostname: kimai.${DOMAIN}
      path: /
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls: true
    persistence:
      storageClass: "longhorn"
    podSecurityContext:
      enabled: true
      fsGroup: 1001
      seccompProfile:
        type: "RuntimeDefault"
    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
    mariadb:
      primary:
        podSecurityContext:
          enabled: true
          fsGroupChangePolicy: Always
          sysctls: []
          supplementalGroups: []
          fsGroup: 1001
        containerSecurityContext:
          enabled: true
          seLinuxOptions: {}
          runAsUser: 1001
          runAsGroup: 1001
          runAsNonRoot: true
          privileged: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: "RuntimeDefault"
