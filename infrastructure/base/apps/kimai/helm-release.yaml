apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kimai
  namespace: kimai
spec:
  chart:
    spec:
      chart: kimai2
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: kimai
        namespace: flux-system
      version: 4.2.5
  interval: 1m0s
  values:
    kimaiAdminEmail: ${EMAIL}
    existingSecret: kimai-secret
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hostname: kimai.${DOMAIN}
      path: /
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls: true
    persistence:
      storageClass: "longhorn"
