apiVersion: apps/v1
kind: Deployment
metadata:
  name: juno-care
  namespace: juno-care
  labels:
    app.kubernetes.io/name: juno-care
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: juno-care
  template:
    metadata:
      labels:
        app.kubernetes.io/name: juno-care
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: juno-care
          image: ghcr.io/juno-care/vibecode-mvp-v1:latest
          ports:
            - containerPort: 5002
              name: http
              protocol: TCP
          env:
            - name: JUNO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: juno-secret-key
                  key: JUNO_SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: juno-care-data
