apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: minio
spec:
  chart:
    spec:
      chart: minio
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      version: 15.0.7
  interval: 1m0s
  values:
    global:
      storageClass: longhorn
    persistence:
      size: 100Gi
    auth:
      existingSecret: minio-secret
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      ingressClassName: nginx
      hostname: minio.${DOMAIN}
      tls: true
    apiIngress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        # allow files with max size of 2GB
        nginx.ingress.kubernetes.io/proxy-body-size: "2g"
      ingressClassName: nginx
      hostname: api.minio.${DOMAIN}
      tls: true
    resources:
      requests:
        cpu: 0.5
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1024Mi
    # disable networkPolicy to use cilium network policy
    networkPolicy:
      enabled: false
    # enable collection of metrics and add alerting
    metrics:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
        rules:
          - alert: minio cluster nodes offline
            annotations:
              summary: "minio cluster nodes offline"
              description: "minio cluster nodes offline, pod {{`{{`}} $labels.pod {{`}}`}} service {{`{{`}} $labels.job {{`}}`}} offline"
              for: 10m
              expr: minio_cluster_nodes_offline_total > 0
              labels:
                severity: critical