apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: apicurio-studio
  namespace: apicurio-studio
spec:
  chart:
    spec:
      chart: apicurio
      sourceRef:
        kind: HelmRepository
        name: apicurio
        namespace: flux-system
      version: 1.0.15
  interval: 1m0s
  values:
    general:
      hostname: "www.apicurio-studio.${DOMAIN}"
    postgresql:
      enabled: false
      host: postgres-cluster-rw.cnpg-cluster
      postgresqlDatabase: apicurio-studio
      postgresqlUsername: apicurio-studio
      postgresqlPassword: UqFJmK6Y27wR0s
    keycloak:
      client:
        id: apicurio-studio
        secret: UCnyn2Tal2Q5mV5rtQOWFVbwdllHJHMs
      realm: hopps
      url: https://auth.${DOMAIN}
    global:
      storageClass: longhorn
    ingress:
      enabled: true
      tls:
        - secretName: apicurio-studio-tls
          hosts:
            - apicurio-studio.${DOMAIN}
    ws:
      securityContext:
        runAsGroup: 0
        runAsUser: 0
    ui:
      securityContext: null
      extraEnvVars:
        # -- UI logging level
        APICURIO_LOGGING_LEVEL: INFO
        # -- UI JVM options
        JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
        # -- Enable Microcks integration?
        APICURIO_UI_FEATURE_MICROCKS: "false"
        # -- Channel Regex
        APICURIO_UI_VALIDATION_CHANNELNAMEREGEXP: ([^{}/]*({[a-zA-Z][0-9a-zA-Z_]*})?)+
        APICURIO_REGISTRY_API_URL: https://apicurio-registry.${DOMAIN}/apis/registry/v3
        APICURIO_REGISTRY_UI_URL: https://apicurio-registry.${DOMAIN}
    api:
      securityContext:
        runAsGroup: 0
        runAsUser: 0