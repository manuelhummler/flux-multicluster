# allow egress from promtail to kube-apiserver
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-from-promtail-to-api-server
spec:
  endpointSelector:
    matchLabels:
      io.cilium.k8s.policy.serviceaccount: loki-stack-promtail
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
---
# allow egress from promtail to loki
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-from-promtail-to-loki
spec:
  endpointSelector:
    matchLabels:
      io.cilium.k8s.policy.serviceaccount: loki-stack-promtail
  egress:
    - toEndpoints:
        - matchLabels:
            io.cilium.k8s.policy.serviceaccount: loki-stack
      toPorts:
        - ports:
            - port: "3100"
---
