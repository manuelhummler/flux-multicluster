apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft
  namespace: minecraft-mittelerde
spec:
  chart:
    spec:
      chart: minecraft
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: itzg-minecraft
        namespace: flux-system
  interval: 1m0s
  values:
    # Minecraft server configuration
    minecraftServer:
      eula: "TRUE"
      version: "0.18.4"
      type: "FABRIC"
      difficulty: normal
      maxPlayers: 20
      viewDistance: 10
      gameMode: survival
      motd: "Des is mir offen!"
      pvp: true
      onlineMode: true
      memory: 8192M
      # World download
      downloadWorldUrl: "https://paf-minecraft.fra1.digitaloceanspaces.com/mittelerde.zip"
      downloadModpackUrl: "https://paf-minecraft.fra1.digitaloceanspaces.com/homestead-modpack.zip"
      # Service configuration
      serviceType: LoadBalancer
      servicePort: 25566
      externalIPs:
        - 46.4.68.185
    # Resource configuration
    resources:
      requests:
        memory: 2Gi
        cpu: 500m
      limits:
        memory: 8Gi
        cpu: 4000m
    # Persistence
    persistence:
      dataDir:
        enabled: true
        size: 10Gi
