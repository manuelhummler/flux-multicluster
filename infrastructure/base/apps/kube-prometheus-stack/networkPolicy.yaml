# allow egress traffik from grafana to keycloak
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-from-grafana-to-keycloak
spec:
  endpointSelector:
    matchLabels:
      io.cilium.k8s.policy.serviceaccount: kube-prometheus-stack-grafana
  egress:
    - toFQDNs:
        - matchName: id.${DOMAIN_2}
      toPorts:
        - ports:
            - port: "443"
    # Note: why does cilium match it to kube-apiserver, could it be an issue with running workload on control-plane?
    - toEntities:
      - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
# Note following FQDN's could still be needed
# secure.gravatar.com
# storage.googleapis.com
---
# Allow TLS
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-acme-solver
spec:
  endpointSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.cilium.k8s.policy.serviceaccount: ingress-nginx
            io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - port: "8089"
