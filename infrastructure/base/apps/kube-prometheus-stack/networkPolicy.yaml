## scraping endpoints
# allow egress from prometheus to scraping endpoints
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-from-prometheus-to-scraping-endpoints
spec:
  endpointSelector:
    matchLabels:
      io.cilium.k8s.policy.serviceaccount: kube-prometheus-stack-prometheus
  egress:
    # Note: as it would be a to high workload to always enable scraping in prometheus, we will allow the whole internal network and the service need to restrict access (e.g. only allow prometheus for scraping endpoint)
    - toEntities:
      - host
      - remote-node
      - cluster
