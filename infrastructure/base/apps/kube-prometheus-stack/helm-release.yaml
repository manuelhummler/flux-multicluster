apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      version: 67.5.0
  interval: 1m0s
  values:
    # disable kube-proxy monitoring, as cilium is used
    defaultRules:
      rules:
        kubeProxy: false
    # disable installation of crds, will be installed beforehand
    crds:
      enabled: false
    alertmanager:
      # configure resolve_timeout for flux (no .EndsAt attribute is set)
      # https://fluxcd.io/flux/components/notification/providers/#prometheus-alertmanager
      #config:
      #  global:
      #    resolve_timeout: 1h
      # ingress
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          # authenticate with oauth2-proxy
          nginx.ingress.kubernetes.io/auth-response-headers: x-auth-request-user, x-auth-request-email
          nginx.ingress.kubernetes.io/auth-signin: https://${OAUTH_PROXY_DOMAIN}/oauth2/start?rd=$scheme://$host$request_uri
          nginx.ingress.kubernetes.io/auth-url: https://${OAUTH_PROXY_DOMAIN}/oauth2/auth
        hosts:
          - alertmanager.${DOMAIN_2}
        ingressClassName: nginx
        tls:
          - hosts:
              - alertmanager.${DOMAIN_2}
            secretName: alertmanager-tls
    grafana:
      #image:
        # update manually, because of security issues in grafana (https://www.heise.de/news/Sicherheitsupdates-Angreifer-koennen-ueber-Grafana-Luecke-eigene-Befehle-ausfuehren-9987442.html)
        #tag: 11.2.2-security-01
      admin:
        # kics-scan ignore-line
        existingSecret: grafana-secret
        userKey: admin-user
        passwordKey: admin-password
      # configure grafana.ini for oauth2 authentication with Keycloak
      grafana.ini:
        server:
          domain: grafana.${DOMAIN_2}
          root_url: https://grafana.${DOMAIN_2}
        # disable analytics
        analytics:
          enabled: false
          reporting_enabled: false
          check_for_updates: false
          check_for_plugin_updates: false
        auth.generic_oauth:
            enabled: true
            auto_login: true
            name: Keycloak
            allow_sign_up: true
            client_id: $__file{/etc/secrets/auth_generic_oauth/client_id}
            # kics-scan ignore-line
            client_secret: $__file{/etc/secrets/auth_generic_oauth/client_secret}
            scopes: openid profile email
            email_attribute_path: email
            login_attribute_path: username
            name_attribute_path: full_name
            auth_url: $__file{/etc/secrets/auth_generic_oauth/keycloak_host}/realms/$__file{/etc/secrets/auth_generic_oauth/keycloak_realm}/protocol/openid-connect/auth
            token_url: $__file{/etc/secrets/auth_generic_oauth/keycloak_host}/realms/$__file{/etc/secrets/auth_generic_oauth/keycloak_realm}/protocol/openid-connect/token
            api_url: $__file{/etc/secrets/auth_generic_oauth/keycloak_host}/realms/$__file{/etc/secrets/auth_generic_oauth/keycloak_realm}/protocol/openid-connect/userinfo
            signout_redirect_url: $__file{/etc/secrets/auth_generic_oauth/keycloak_host}/realms/$__file{/etc/secrets/auth_generic_oauth/keycloak_realm}/protocol/openid-connect/logout?redirect_uri=https%3A%2F%2Fgrafana.${DOMAIN_2}%2Flogin
            role_attribute_path: contains(roles[*], 'grafana-admin') && 'Admin' || contains(roles[*], 'grafana-editor') && 'Editor' || contains(roles[*], 'grafana-viewer') && 'Viewer'
      # Configure Secrets Mounts, to mount Keycloak secrets securely
      extraSecretMounts:
        - name: grafana-oauth-secret
          secretName: grafana-oauth-secret
          defaultMode: 288
          mountPath: /etc/secrets/auth_generic_oauth
          readOnly: true
      dashboards:
        default:
          # all these charts are hosted at https://grafana.com/grafana/dashboards/{id}
          # linkerd
          top-line:
            gnetId: 15474
            revision: 4
            datasource: prometheus
          health:
            gnetId: 15486
            revision: 3
            datasource: prometheus
          kubernetes:
            gnetId: 15479
            revision: 2
            datasource: prometheus
          namespace:
            gnetId: 15478
            revision: 3
            datasource: prometheus
          deployment:
            gnetId: 15475
            revision: 6
            datasource: prometheus
          pod:
            gnetId: 15477
            revision: 3
            datasource: prometheus
          service:
            gnetId: 15480
            revision: 3
            datasource: prometheus
          route:
            gnetId: 15481
            revision: 3
            datasource: prometheus
          authority:
            gnetId: 15482
            revision: 3
            datasource: prometheus
          cronjob:
            gnetId: 15483
            revision: 3
            datasource: prometheus
          job:
            gnetId: 15487
            revision: 3
            datasource: prometheus
          daemonset:
            gnetId: 15484
            revision: 3
            datasource: prometheus
          replicaset:
            gnetId: 15491
            revision: 3
            datasource: prometheus
          statefulset:
            gnetId: 15493
            revision: 3
            datasource: prometheus
          replicationcontroller:
            gnetId: 15492
            revision: 4
            datasource: prometheus
          prometheus:
            gnetId: 15489
            revision: 2
            datasource: prometheus
          prometheus-benchmark:
            gnetId: 15490
            revision: 2
            datasource: prometheus
          multicluster:
            gnetId: 15488
            revision: 3
            datasource: prometheus
          # trivy-operator
          trivy-operator:
            gnetId: 17813
            revision: 2
            datasource: prometheus
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: 'default'
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - grafana.${DOMAIN_2}
        ingressClassName: nginx
        tls:
          - hosts:
              - grafana.${DOMAIN_2}
            secretName: grafana-tls
    prometheus:
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          # authenticate with oauth2-proxy
          nginx.ingress.kubernetes.io/auth-response-headers: x-auth-request-user, x-auth-request-email
          nginx.ingress.kubernetes.io/auth-signin: https://${OAUTH_PROXY_DOMAIN}/oauth2/start?rd=$scheme://$host$request_uri
          nginx.ingress.kubernetes.io/auth-url: https://${OAUTH_PROXY_DOMAIN}/oauth2/auth
        hosts:
          - prometheus.${DOMAIN_2}
        ingressClassName: nginx
        tls:
          - hosts:
              - prometheus.${DOMAIN_2}
            secretName: prometheus-tls
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        scrapeConfigSelector:
          matchLabels: null
        podMonitorSelector:
          matchLabels: null
        serviceMonitorSelector:
          matchLabels: null
        ruleSelector:
          matchLabels: null
        # if needed add custom scrape configs
        additionalScrapeConfigs: {}
