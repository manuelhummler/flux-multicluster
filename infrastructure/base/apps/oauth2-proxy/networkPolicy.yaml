# allow ingress from traefik
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress
spec:
  endpointSelector:
    matchLabels:
      io.cilium.k8s.policy.serviceaccount: oauth2-proxy
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.cilium.k8s.policy.serviceaccount: traefik
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "4180"
---
