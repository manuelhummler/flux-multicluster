# allow egress traffik from oauth2-proxy to keycloak
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-to-keycloak
spec:
  endpointSelector:
    matchLabels:
      io.cilium.k8s.policy.serviceaccount: oauth2-proxy
  egress:
    - toFQDNs:
        - matchPattern: "*.${DOMAIN}"
        - matchPattern: "*.${DOMAIN_2}"
        - matchPattern: "*.${DOMAIN_3}"
      toPorts:
        - ports:
            - port: "443"
---
# allow egress for keycloak callback
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-to-keycloak-callback
spec:
  endpointSelector:
    matchLabels:
      io.cilium.k8s.policy.serviceaccount: oauth2-proxy
  egress:
    - toEntities:
        - "world"
        - "cluster"
