apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      version: 1.10.0
  interval: 1m0s
  values:
    ingress:
      enabled: true
      ingressClassName: traefik
      host: longhorn.${DOMAIN}
      tls: true
      secureBackends: true
      # kics-scan ignore-line
      tlsSecret: longhorn-tls
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        # authenticate with oauth2-proxy
        traefik.ingress.kubernetes.io/router.middlewares: traefik-oauth-forwardauth@kubernetescrd,traefik-oauth-forwardauth-service@kubernetescrd
    networkPolicies:
      enabled: true
      type: "rke1"
    metrics:
      serviceMonitor:
        enabled: true
    persistence:
      defaultClassReplicaCount: 2
    defaultSettings:
      # set to true when number of worker nodes is < 3
      replicaSoftAntiAffinity: true
      allowCollectingLonghornUsageMetrics: false
      # 1.10+ requires per-data-engine map as a string (was a plain int in 1.9)
      guaranteedInstanceManagerCPU: '{"v1":"6","v2":"6"}'
    # disable upgrade checker as FluxCD is used with renovate for upgrades:
    preUpgradeChecker:
      jobEnabled: false
      upgradeVersionCheck: false

