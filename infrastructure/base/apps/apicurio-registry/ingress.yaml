apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apicurio-registry
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://apicurio-studio.${DOMAIN}"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    # authenticate with oauth2-proxy
    #nginx.ingress.kubernetes.io/auth-response-headers: x-auth-request-user, x-auth-request-email
    #nginx.ingress.kubernetes.io/auth-signin: https://${OAUTH_PROXY_DOMAIN}/oauth2/start?rd=$scheme://$host$request_uri
    #nginx.ingress.kubernetes.io/auth-url: https://${OAUTH_PROXY_DOMAIN}/oauth2/auth
spec:
  ingressClassName: nginx
  rules:
    - host: apicurio-registry.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apicurio-registry
                port:
                  name: http
  tls:
    - hosts:
        - apicurio-registry.${DOMAIN}
      secretName: apicurio-registry-tls