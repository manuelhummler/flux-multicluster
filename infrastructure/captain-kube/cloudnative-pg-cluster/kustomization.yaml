apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cnpg-cluster
resources:
  - cluster.yaml
  - namespace.yaml
  - networkPolicy.yaml
  - storageClass.yaml
  - database.yaml
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: minio-s3
    # Kustomize will encode it to base64
    envs:
      - minio-secret-encrypted.env
  - name: apicurio-studio-secret
    envs:
      - secrets/apicurio-studio-encrypted.env
