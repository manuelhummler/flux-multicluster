apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - ../../base/apps/kube-prometheus-stack
  - ../../base/apps/loki-stack
  - namespace.yaml
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: grafana-secret
    envs:
      - secrets/grafana-secret-encrypted.env
  - name: grafana-oauth-secret
    envs:
      - secrets/grafana-oauth-secret-encrypted.env
