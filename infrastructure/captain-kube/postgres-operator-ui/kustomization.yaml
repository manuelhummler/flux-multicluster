apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/apps/postgres-operator-ui
# create all needed secrets with fix name
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: postgres-operator-ui
    namespace: postgres-operator-ui
    envs:
      - secret-encrypted.env
